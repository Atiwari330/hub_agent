name: Morning Briefing

on:
  schedule:
    # 5:00 AM EST = 10:00 AM UTC (weekdays only)
    - cron: '0 10 * * 1-5'
  workflow_dispatch:
    # Manual trigger for testing or on-demand regeneration

env:
  HUBSPOT_ACCESS_TOKEN: ${{ secrets.HUBSPOT_ACCESS_TOKEN }}
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  AI_GATEWAY_API_KEY: ${{ secrets.AI_GATEWAY_API_KEY }}
  CRON_SECRET: ${{ secrets.CRON_SECRET }}
  NEXT_PUBLIC_APP_URL: ${{ secrets.APP_URL }}

jobs:
  generate-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate morning briefing
        run: npx tsx src/scripts/generate-morning-briefing.ts
        timeout-minutes: 25
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
